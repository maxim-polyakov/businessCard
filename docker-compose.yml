version: '3.8'

services:
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visiteka-react-app
    ports:
      - "3015:3000"
    # Без volumes: контейнер отдаёт сборку из образа (build/ с index.html).
    # Иначе .:/app подменяет /app — на хосте может не быть build/ → "Index of build/".
    # volumes:
    #   - .:/app
    #   - /app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - visiteka-network

networks:
  visiteka-network:
    driver: bridge

volumes:
  node_modules: